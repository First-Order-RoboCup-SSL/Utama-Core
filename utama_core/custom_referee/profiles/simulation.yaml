profile_name: "simulation"
geometry:
  half_length: 4.5
  half_width: 3.0
  half_goal_width: 0.5
  half_defense_depth: 0.5
  half_defense_width: 1.0
  center_circle_radius: 0.5
rules:
  goal_detection:
    enabled: true
    cooldown_seconds: 1.0
  out_of_bounds:
    enabled: true
    free_kick_assigner: "last_touch"
  defense_area:
    enabled: true
    max_defenders: 1
    attacker_infringement: true
  keep_out:
    enabled: true
    radius_meters: 0.5
    violation_persistence_frames: 30
game:
  half_duration_seconds: 300.0
  kickoff_team: "yellow"
  force_start_after_goal: false
  prepare_duration_seconds: 3.0   # seconds in PREPARE_KICKOFF before NORMAL_START is auto-issued
  kickoff_timeout_seconds: 10.0   # seconds after NORMAL_START before FORCE_START if ball hasn't moved
  auto_advance:
    stop_to_next_command: true      # STOP → queued restart when all robots clear
    prepare_kickoff_to_normal: true # PREPARE_KICKOFF_* → NORMAL_START when kicker in circle
    prepare_penalty_to_normal: true # PREPARE_PENALTY_* → NORMAL_START when kicker reaches the mark
    direct_free_to_normal: true     # DIRECT_FREE_* → NORMAL_START when kicker ready
    ball_placement_to_next: true    # BALL_PLACEMENT_* → next_command when ball at target
    normal_start_to_force: true     # NORMAL_START → FORCE_START on kickoff timeout
